<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="#4f46e5" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Verspielt-handgezeichnetes Torii (Duolingo-Stil): leicht unregelmaessig,
       weiche Pinselstrich-Optik durch round-caps + ganz minimal kurvige Pfade. -->

  <!-- Kasagi (oberer Querbalken) — leicht aufgebogen an den Enden -->
  <path d="M 7 17 Q 32 12 57 17 L 56 21 Q 32 16 8 21 Z" fill="#4f46e5" stroke="#4f46e5" stroke-width="1.5"/>

  <!-- Nuki (zweiter Querbalken) — gerade -->
  <path d="M 11 27 Q 32 25 53 27" stroke-width="3.4"/>

  <!-- Gakuzuka (kleiner Verbindungs-Strich Mitte oben) -->
  <path d="M 32 22 L 32 26.5" stroke-width="2.6"/>

  <!-- Linke Saeule (Hashira) — leicht nach aussen geneigt, organisch -->
  <path d="M 14.5 22 Q 13.5 38 12.2 56" stroke-width="4.2"/>

  <!-- Rechte Saeule (Hashira) — Spiegel-Asymmetrie fuer 'handgezeichnet'-Feel -->
  <path d="M 49.5 22 Q 50.7 38 51.8 56" stroke-width="4.2"/>

  <!-- Boden-Anker (winzige Strichelchen unten — wie Boden, optional dezent) -->
  <path d="M 8 56 Q 16 57 24 56" stroke-width="1.8" opacity="0.55"/>
  <path d="M 40 56 Q 48 57 56 56" stroke-width="1.8" opacity="0.55"/>
</svg>
