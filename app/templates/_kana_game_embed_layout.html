{% set kgame_embed = true %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow">
    <title>Hiragana-Spiel</title>

    {# Nur das Noetige fuers Spiel — bewusst ohne base.html-Chrome (Top-Nav,
       Footer, OG-Tags). Das Embed laeuft isoliert im iframe der Startseite. #}
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ static_v('css/custom.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Serif+JP:wght@400;500&display=swap">
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap">

    <style>
        [x-cloak] { display: none !important; }

        /* H-1: visuell versteckt, aber von Screenreadern lesbar (aria-live-Region). */
        .sr-only {
            position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
            overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
        }

        /* ══════════════════════════════════════════════════════════════════
           EMBED-VIEWPORT — das Spiel fuellt die <iframe>-Box zu 100 %. Die
           Hoehe kommt von AUSSEN (die Eltern-Seite setzt die iframe-Hoehe),
           daher height:100% statt calc(100dvh - 60px) — das neutralisiert den
           iOS-100dvh-Quirk. Kein Page-Scroll, HUD + Pool fixiert, Gitter
           scrollt intern.
           ══════════════════════════════════════════════════════════════════ */
        html, body { height: 100%; margin: 0; overflow: hidden; }
        body { background: var(--background-color, #FAF7F2); color: var(--tetsu, #2C2C2C); }

        .kgame {
            height: 100%;
            /* #13: Cap auf ~900px angehoben (mit der Index-Lane abgestimmt), damit das
               Spiel auf Desktop in der breiteren .kana-embed-card mitskaliert. Hoehe
               kommt weiterhin von AUSSEN (height:100%) — Fullscreen/Mobile unveraendert. */
            /* #1: box-sizing border-box — sonst addiert das 0.75rem-Seitenpadding
               24px AUF die width:100% (=> 414px > 390px Viewport) und klemmt die
               rechte Gitterspalte + den 0/46-Zaehler ab (overflow:hidden, kein Scroll). */
            box-sizing: border-box;
            width: 100%; max-width: 900px; margin: 0 auto;
            display: flex; flex-direction: column; min-height: 0;
            padding: 0.5rem 0.75rem calc(0.6rem + env(safe-area-inset-bottom, 0px));
        }

        /* ── HUD: Back-Spacer · Timer (Hero) · Fortschritt ── */
        .kgame__hud { flex: 0 0 auto; display: flex; align-items: center; gap: 0.6rem; padding: 0.15rem 0 0.4rem; }
        .kgame__back {
            flex: 0 0 auto; width: 40px; height: 40px; border-radius: 11px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--ink-200, #E4DED4); background: var(--card-bg, #FFFDF7);
            color: var(--ink-600, #5C564D); font-size: 1rem; text-decoration: none;
            transition: border-color .15s ease, color .15s ease;
        }
        /* Embed: Back-Button entfaellt, Spacer haelt den Timer mittig. */
        .kgame__back--spacer { visibility: hidden; border: 0; background: transparent; pointer-events: none; }

        .kgame__timer { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .kgame__time {
            font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums;
            font-size: 1.55rem; font-weight: 700; color: var(--kon, #1F2A44); letter-spacing: 0.01em;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .kgame__time i { font-size: 0.95rem; color: var(--ink-400, #A8A095); }
        .kgame__mode {
            font: 600 0.62rem/1 'Geist', 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.1em;
            color: var(--text-muted, #8C8378); margin-top: 3px;
        }
        .kgame__timer.is-running .kgame__time i { color: var(--shu, #EB6101); animation: kgameTick 1s steps(2, end) infinite; }
        @keyframes kgameTick { 50% { opacity: 0.3; } }

        .kgame__meta {
            flex: 0 0 auto; display: flex; align-items: center; gap: 0.6rem;
            font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums;
        }
        .kgame__count { font-size: 0.98rem; font-weight: 700; color: var(--kon, #1F2A44); }
        .kgame__count .sep { color: var(--ink-300, #D4CCBE); margin: 0 1px; }
        .kgame__errs { font-size: 0.85rem; color: var(--danger, #D14B3D); display: inline-flex; align-items: center; gap: 0.2rem; }
        .kgame__errs i { font-size: 0.78rem; }
        .kgame__hints { font-size: 0.82rem; color: #b9870e; display: inline-flex; align-items: center; gap: 0.2rem; }
        .kgame__hints.is-empty { color: var(--ink-400, #A8A095); opacity: 0.7; }

        /* Fortschrittsbalken */
        .kgame__bar { flex: 0 0 auto; height: 5px; border-radius: 999px; background: var(--ink-100, #F1EDE6); overflow: hidden; margin-bottom: 0.5rem; }
        .kgame__bar-fill { height: 100%; background: var(--shu, #EB6101); border-radius: 999px; transition: width .35s ease; }

        /* ── Bühne ── */
        .kgame__stage { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; }

        .kgame__state {
            flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; gap: 0.8rem;
            padding: 1.5rem 1rem; color: var(--text-muted, #8C8378);
        }
        .kgame__spinner, .kgame__state-ico { font-size: 2.4rem; color: var(--shu, #EB6101); }
        .kgame__state-ico--soft { color: var(--matcha, #7A9033); }
        .kgame__state p { margin: 0; max-width: 34ch; }
        .kgame__state-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .kgame__state-btn {
            display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.05rem;
            border-radius: 11px; background: var(--shu, #EB6101); color: #fff;
            font: 600 0.85rem 'Inter', sans-serif; text-decoration: none; border: 1px solid var(--shu, #EB6101); cursor: pointer;
        }
        .kgame__state-btn:hover { filter: brightness(1.05); color: #fff; text-decoration: none; }
        .kgame__state-btn--ghost { background: #fff; color: var(--ink-700, #403B34); border-color: var(--border-color, #D4CFC5); }
        .kgame__state-btn--ghost:hover { border-color: var(--shu, #EB6101); color: var(--shu, #EB6101); }

        /* Spiel-Container: das geerbte Karten-Layout aufheben, in den Flex einpassen. */
        .kana-grid-game.kgame__game {
            background: transparent; border: 0; border-radius: 0; padding: 0; margin: 0;
            flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
            /* #2: flex-start statt center — Inhalt packt von oben (HUD→Gitter→Pool),
               kein symmetrisches Abschneiden; das Gitter scrollt intern. */
            justify-content: flex-start;
        }
        .kgame__game .kana-grid-game__taphint { flex: 0 0 auto; margin: 0 0 0.4rem; }

        /* #3: Spot-the-difference-Hinweis (erscheint nach dem 1. Fehler) */
        .kana-grid-game__diffhint {
            flex: 0 0 auto; position: relative;
            display: flex; align-items: flex-start; gap: 0.5rem;
            margin: 0 0 0.5rem; padding: 0.55rem 1.9rem 0.55rem 0.7rem;
            background: #FFF8EC; border: 1px solid #F0D9A8;
            border-left: 3px solid var(--shu, #EB6101); border-radius: 10px;
            font: 500 0.78rem/1.35 'Inter', sans-serif; color: var(--ink-700, #403B34);
            max-height: 5.5em; overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .kana-grid-game__diffhint-char {
            flex: 0 0 auto; font-family: 'Klee One', 'Noto Serif JP', serif;
            font-size: 1.3rem; line-height: 1; color: var(--shu, #EB6101);
        }
        .kana-grid-game__diffhint-text { flex: 1 1 auto; }
        .kana-grid-game__diffhint-close {
            position: absolute; top: 0.2rem; right: 0.35rem;
            border: 0; background: transparent; cursor: pointer;
            font-size: 1.1rem; line-height: 1; color: var(--text-muted, #8C8378); padding: 0.1rem 0.3rem;
        }
        .kana-grid-game__diffhint-close:hover { color: var(--shu, #EB6101); }
        /* Gitter = der scrollende Teil */
        .kgame__game .kgame__grid {
            flex: 0 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
            margin: 0; padding: 0.15rem 0.15rem 0.5rem;
        }
        /* Pool als gepinntes Tray unten — im Flex-Layout statt sticky */
        .kana-grid-game__pool {
            position: static; bottom: auto; flex: 0 0 auto;
            max-height: 30vh; overflow-y: auto; margin: 0; box-shadow: none;
        }

        /* Ergebnis-Panel — ersetzt den Pool, Gitter bleibt als Merkhilfe sichtbar */
        .kgame__result { flex: 0 0 auto; text-align: center; padding: 0.55rem 0.5rem 0.15rem; }
        .kgame__stars { display: inline-flex; gap: 0.45rem; font-size: 1.8rem; margin-bottom: 0.35rem; }
        .kgame__stars i { color: #d6cfc2; }
        .kgame__stars i.is-earned { color: #f1c40f; text-shadow: 0 1px 3px rgba(241,196,15,.4); animation: kanaGridStar 0.4s ease; }
        .kgame__result-stats {
            display: inline-flex; gap: 1.1rem; font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 0.92rem; color: var(--ink-600, #5C564D); margin-bottom: 0.6rem;
        }
        .kgame__result-stats i { margin-right: 0.25rem; color: var(--ink-400, #A8A095); }
        .kgame__bonus {
            display: inline-flex; align-items: center; gap: 0.4rem;
            margin-bottom: 0.6rem; padding: 0.3rem 0.8rem; border-radius: 999px;
            background: #FFF4DA; border: 1px solid #F0D9A8; color: #9a6a06;
            font: 700 0.84rem 'Inter', sans-serif;
        }
        .kgame__bonus i { color: #f1c40f; }
        /* Gast-Hinweis im Ergebnis: Fortschritt wird nicht gespeichert */
        .kgame__embed-note {
            margin: 0 0 0.6rem; font: 500 0.78rem/1.35 'Inter', sans-serif;
            color: var(--text-muted, #8C8378);
        }
        .kgame__result-actions { display: flex; gap: 0.5rem; justify-content: center; }
        .kgame__again {
            display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.6rem 1.15rem;
            border-radius: 12px; font: 600 0.9rem 'Inter', sans-serif; cursor: pointer; text-decoration: none; border: 1px solid transparent;
            background: var(--shu, #EB6101); color: #fff; border-color: var(--shu, #EB6101);
        }
        .kgame__again:hover { filter: brightness(1.05); }
    </style>

    <script>
        /* Embed-Modus: das Spiel laeuft immer als Gast (komplettes Grund-Hiragana,
           kein Score-Speichern). initView() in kana_grid_game.js liest dieses Flag
           und nutzt den public-Endpoint; goToSettings/Abschluss melden sich per
           postMessage bei der Eltern-Seite (Startseite). */
        window.kgameEmbed = true;
        window.currentUser = null;
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script defer src="{{ static_v('js/kana_grid_game.js') }}"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>
    {% include '_kana_game_stage.html' %}
</body>
</html>
