{# ── Core JS: CSRF, Utilities, Lesson CRUD, Categories ─────────────── #}
<script>
let currentLessonId = null;
let categories = [];

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function getCSRFToken() {
    const form = document.getElementById('addLessonForm');
    if (form && form.csrf_token) return form.csrf_token.value;
    const meta = document.querySelector('meta[name="csrf-token"]');
    if (meta) return meta.content;
    return null;
}

function truncateText(text, maxLength) {
    if (!text) return '';
    return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
}

function getContentTypeBadgeClass(contentType) {
    const badgeClasses = {
        'kana': 'bg-primary', 'kanji': 'bg-success', 'vocabulary': 'bg-info',
        'grammar': 'bg-warning', 'text': 'bg-secondary', 'image': 'bg-purple',
        'video': 'bg-danger', 'audio': 'bg-dark', 'interactive': 'bg-orange'
    };
    return badgeClasses[contentType] || 'bg-light';
}

// ── Load Lessons ────────────────────────────────────────────────────
async function loadLessons() {
    try {
        const response = await fetch('/api/admin/lessons');
        const lessons = await response.json();
        window.availableLessons = lessons;

        const tbody = document.querySelector('#lessonsTable tbody');
        tbody.innerHTML = '';

        if (lessons.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" class="!text-center !py-8 !text-gray-400 dark:!text-slate-500">No lessons yet</td></tr>';
            return;
        }

        // Sortable-Container ueber tbody (Sortable kann tr's sortieren, aber
        // wir haben Doppel-Rows pro Lesson (Title + Data) — wir gruppieren via tbody-Blocks).
        // Einfacher: ein tbody pro Lesson, jedes tbody ist sortierbar im Table.
        // Wir loesen das indem wir nur die DATA-rows als draggable markieren und nach Reorder
        // die komplette Tabelle neu rendern.

        lessons.forEach((lesson, index) => {
            // Title row spanning all columns
            const titleRow = document.createElement('tr');
            titleRow.dataset.lessonId = lesson.id;
            titleRow.dataset.lessonRow = 'title';
            titleRow.className = (index > 0 ? 'border-t-2 border-gray-200 dark:border-slate-700 ' : '') + 'lesson-row';
            titleRow.innerHTML = `
                <td colspan="11" class="!py-2.5 !px-4 !bg-gray-50/80 dark:!bg-slate-800/30">
                    <div class="flex items-center gap-3">
                        <span class="drag-handle lesson-drag-handle" title="Ziehen zum Umsortieren"><i class="fas fa-grip-vertical"></i></span>
                        <input type="checkbox" class="lesson-checkbox !w-4 !h-4 !mb-0" value="${lesson.id}" onclick="event.stopPropagation(); updateBulkBar();">
                        <span class="text-base font-semibold text-gray-900 dark:text-white inline-editable" data-inline-edit="lesson-title" data-lesson-id="${lesson.id}" contenteditable="true" spellcheck="false">${escapeHtml(lesson.title)}</span>
                        <span class="text-xs text-gray-400 dark:text-slate-500">#${lesson.id}</span>
                    </div>
                </td>
            `;
            tbody.appendChild(titleRow);

            // Data row
            const row = document.createElement('tr');
            row.dataset.lessonId = lesson.id;
            row.dataset.lessonRow = 'data';
            row.className = 'lesson-row hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-colors';
            row.innerHTML = `
                <td>
                    <span class="text-xs text-gray-500 dark:text-slate-400">${lesson.order_index}</span>
                </td>
                <td class="!text-gray-400 dark:!text-slate-500 !text-sm">${lesson.id}</td>
                <td><span class="badge badge-info">${escapeHtml(lesson.category_name) || 'No Category'}</span></td>
                <td><span class="badge ${lesson.lesson_type === 'free' ? 'badge-success' : 'badge-warning'}">${escapeHtml(lesson.lesson_type)}</span></td>
                <td class="!text-sm">
                    ${lesson.price > 0 ?
                        `<span class="badge badge-warning">CHF ${lesson.price.toFixed(2)}</span>` +
                        (lesson.is_purchasable ? ' <span class="badge badge-success text-[0.6rem]">Buy</span>' : '') :
                        '<span class="badge badge-success">Free</span>'
                    }
                </td>
                <td class="!text-sm !text-gray-500 dark:!text-slate-400">${lesson.difficulty_level || '--'}</td>
                <td class="!text-sm !text-gray-500 dark:!text-slate-400">${lesson.estimated_duration || '--'} min</td>
                <td class="!text-sm !text-gray-500 dark:!text-slate-400">${escapeHtml(lesson.instruction_language) || '--'}</td>
                <td class="!text-sm">${lesson.content_count}</td>
                <td><span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${lesson.is_published ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300' : 'bg-gray-100 text-gray-600 dark:bg-slate-700 dark:text-slate-400'}">${lesson.is_published ? 'Yes' : 'No'}</span></td>
                <td class="!text-center">
                    <div class="flex items-center justify-center gap-1">
                        <button class="!bg-transparent !text-gray-400 hover:!text-blue-600 !shadow-none !p-1.5 !rounded" onclick="manageContent(${lesson.id}, '${escapeHtml(lesson.title).replace(/'/g, "\\'")}')" title="Manage Content"><i class="fas fa-list text-xs"></i></button>
                        <button class="!bg-transparent !text-gray-400 hover:!text-primary-600 !shadow-none !p-1.5 !rounded" onclick="editLesson(${lesson.id})" title="Edit"><i class="fas fa-pen-to-square text-xs"></i></button>
                        <button class="!bg-transparent !text-gray-400 hover:!text-red-600 !shadow-none !p-1.5 !rounded" onclick="deleteLesson(${lesson.id})" title="Delete"><i class="fas fa-trash-can text-xs"></i></button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });

        populateExportOptions();
        initLessonSortable();
        initLessonInlineEdit();
        updateBulkBar();
    } catch (error) {
        console.error('Error loading lessons:', error);
        showToast('Error loading lessons', 'error');
    }
}

// ── SortableJS for lessons table ────────────────────────────────────
let _lessonSortable = null;
function initLessonSortable() {
    const tbody = document.querySelector('#lessonsTable tbody');
    if (!tbody || typeof Sortable === 'undefined') return;
    if (_lessonSortable) { try { _lessonSortable.destroy(); } catch (e) {} }

    // Sortable only accepts sibling elements. We drag the TITLE row; the DATA row
    // moves together because we pair them in onEnd.
    _lessonSortable = new Sortable(tbody, {
        handle: '.lesson-drag-handle',
        draggable: 'tr[data-lesson-row="title"]',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        onEnd: async function(evt) {
            // After the title row moves, also move its data row neighbor.
            // Collect current order of lesson IDs from the DOM.
            const titleRows = tbody.querySelectorAll('tr[data-lesson-row="title"]');
            const ids = [];
            titleRows.forEach(tr => {
                const id = parseInt(tr.dataset.lessonId);
                ids.push(id);
                // Ensure data row follows the title row.
                const dataRow = tbody.querySelector(`tr[data-lesson-row="data"][data-lesson-id="${id}"]`);
                if (dataRow && tr.nextSibling !== dataRow) {
                    tbody.insertBefore(dataRow, tr.nextSibling);
                }
            });
            try {
                const res = await fetch('/api/admin/lessons/reorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ lesson_ids: ids })
                });
                if (!res.ok) throw new Error('reorder failed');
                showToast('Reihenfolge gespeichert');
            } catch (err) {
                console.error(err);
                showToast('Fehler beim Speichern — bitte neu laden', 'error');
                loadLessons();
            }
        }
    });
}

// ── Inline-edit lesson titles via contenteditable ──────────────────
function initLessonInlineEdit() {
    document.querySelectorAll('[data-inline-edit="lesson-title"]').forEach(el => {
        if (el.dataset.inlineInit) return;
        el.dataset.inlineInit = '1';
        el.dataset.original = el.textContent.trim();

        // Block lesson-row drag from handle when clicking the editable title
        el.addEventListener('mousedown', (e) => e.stopPropagation());

        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
            if (e.key === 'Escape') { el.textContent = el.dataset.original; el.blur(); }
        });
        el.addEventListener('blur', async () => {
            const newTitle = el.textContent.trim();
            if (!newTitle || newTitle === el.dataset.original) { el.textContent = el.dataset.original; return; }
            const lessonId = el.dataset.lessonId;
            el.classList.add('saving');
            try {
                const res = await fetch(`/api/admin/lessons/${lessonId}/patch`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ title: newTitle })
                });
                if (!res.ok) throw new Error('patch failed');
                el.dataset.original = newTitle;
                el.classList.remove('saving');
                el.classList.add('saved');
                setTimeout(() => el.classList.remove('saved'), 800);
            } catch (err) {
                console.error(err);
                el.textContent = el.dataset.original;
                el.classList.remove('saving');
                showToast('Fehler beim Speichern', 'error');
            }
        });
    });
}

// ── Bulk Selection Bar ──────────────────────────────────────────────
function updateBulkBar() {
    const bar = document.getElementById('lessonsBulkBar');
    if (!bar) return;
    const checked = document.querySelectorAll('.lesson-checkbox:checked');
    if (checked.length === 0) { bar.style.display = 'none'; return; }
    bar.style.display = 'flex';
    const count = bar.querySelector('[data-bulk-count]');
    if (count) count.textContent = checked.length;
}
function getSelectedLessonIds() {
    return Array.from(document.querySelectorAll('.lesson-checkbox:checked')).map(cb => parseInt(cb.value));
}
async function bulkDeleteLessons() {
    const ids = getSelectedLessonIds();
    if (ids.length === 0) return;
    if (!confirm(`${ids.length} Lektion(en) wirklich loeschen?`)) return;
    for (const id of ids) {
        try { await fetch(`/api/admin/lessons/${id}/delete`, { method: 'DELETE', headers: { 'X-CSRFToken': getCSRFToken() }}); }
        catch (e) { console.error(e); }
    }
    showToast(`${ids.length} Lektion(en) geloescht`);
    loadLessons();
}
async function bulkPublishLessons(state) {
    const ids = getSelectedLessonIds();
    if (ids.length === 0) return;
    for (const id of ids) {
        try {
            await fetch(`/api/admin/lessons/${id}/patch`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                body: JSON.stringify({ is_published: state })
            });
        } catch (e) { console.error(e); }
    }
    showToast(`${ids.length} Lektion(en) ${state ? 'veroeffentlicht' : 'entzogen'}`);
    loadLessons();
}

// ── Load Categories ─────────────────────────────────────────────────
async function loadCategories() {
    try {
        const response = await fetch('/api/admin/categories');
        categories = await response.json();

        ['lessonCategory', 'editLessonCategory'].forEach(selectId => {
            const select = document.getElementById(selectId);
            while (select.children.length > 1) select.removeChild(select.lastChild);
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category.id;
                option.textContent = category.name;
                select.appendChild(option);
            });
        });
    } catch (error) {
        console.error('Error loading categories:', error);
    }
}

// ── Add Lesson ──────────────────────────────────────────────────────
document.getElementById('addLessonForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    data.is_published = document.getElementById('lessonPublished').checked;
    data.allow_guest_access = document.getElementById('lessonGuestAccess').checked;
    data.show_romaji_on_front = document.getElementById('lessonShowRomaji').checked;
    data.is_purchasable = document.getElementById('lessonPurchasable').checked;
    ['category_id', 'difficulty_level', 'estimated_duration', 'thumbnail_url', 'video_intro_url'].forEach(field => {
        if (data[field] === '') data[field] = null;
    });

    try {
        const response = await fetch('/api/admin/lessons/new', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify(data)
        });
        if (response.ok) {
            closeModal('addLessonModal');
            this.reset();
            loadLessons();
            showToast('Lesson added successfully');
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error adding lesson:', error);
        showToast('Error adding lesson', 'error');
    }
});

// ── Edit Lesson ─────────────────────────────────────────────────────
async function editLesson(id) {
    try {
        const response = await fetch(`/api/admin/lessons/${id}`);
        const lesson = await response.json();

        document.getElementById('editLessonId').value = lesson.id;
        document.getElementById('editLessonTitle').value = lesson.title;
        document.getElementById('editLessonDescription').value = lesson.description || '';
        document.getElementById('editLessonType').value = lesson.lesson_type;
        document.getElementById('editLessonCategory').value = lesson.category_id || '';
        document.getElementById('editLessonDifficulty').value = lesson.difficulty_level || '';
        document.getElementById('editLessonDuration').value = lesson.estimated_duration || '';
        document.getElementById('editLessonOrder').value = lesson.order_index || 0;
        document.getElementById('editLessonThumbnail').value = lesson.thumbnail_url || '';
        document.getElementById('editLessonVideo').value = lesson.video_intro_url || '';
        document.getElementById('editLessonLanguage').value = lesson.instruction_language || 'english';
        document.getElementById('editLessonPublished').checked = lesson.is_published;
        document.getElementById('editLessonGuestAccess').checked = lesson.allow_guest_access || false;
        document.getElementById('editLessonShowRomaji').checked = lesson.show_romaji_on_front !== false;
        document.getElementById('editLessonPrice').value = lesson.price || 0;
        document.getElementById('editLessonPurchasable').checked = lesson.is_purchasable || false;

        openModal('editLessonModal');
    } catch (error) {
        console.error('Error loading lesson:', error);
        showToast('Error loading lesson', 'error');
    }
}

// ── Update Lesson ───────────────────────────────────────────────────
document.getElementById('editLessonForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());
    const id = data.id;
    delete data.id;
    data.is_published = document.getElementById('editLessonPublished').checked;
    data.allow_guest_access = document.getElementById('editLessonGuestAccess').checked;
    data.show_romaji_on_front = document.getElementById('editLessonShowRomaji').checked;
    data.is_purchasable = document.getElementById('editLessonPurchasable').checked;
    ['category_id', 'difficulty_level', 'estimated_duration', 'thumbnail_url', 'video_intro_url'].forEach(field => {
        if (data[field] === '') data[field] = null;
    });

    try {
        const response = await fetch(`/api/admin/lessons/${id}/edit`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify(data)
        });
        if (response.ok) {
            closeModal('editLessonModal');
            loadLessons();
            showToast('Lesson updated successfully');
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error updating lesson:', error);
        showToast('Error updating lesson', 'error');
    }
});

// ── Delete Lesson ───────────────────────────────────────────────────
async function deleteLesson(id) {
    if (!confirm('Are you sure you want to delete this lesson? This action cannot be undone.')) return;
    try {
        const response = await fetch(`/api/admin/lessons/${id}/delete`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCSRFToken() }
        });
        if (response.ok) {
            loadLessons();
            showToast('Lesson deleted');
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error deleting lesson:', error);
        showToast('Error deleting lesson', 'error');
    }
}

// ── Move Lesson ─────────────────────────────────────────────────────
async function moveLesson(lessonId, direction) {
    try {
        const response = await fetch(`/api/admin/lessons/${lessonId}/move`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ direction: direction })
        });
        if (response.ok) {
            loadLessons();
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error moving lesson:', error);
        showToast('Error moving lesson', 'error');
    }
}

// ── Focus/Edit bei URL-Parametern ────────────────────────────────────
function handleUrlParams() {
    const params = new URLSearchParams(window.location.search);
    const editId = params.get('edit');
    const focusId = params.get('focus') || editId;
    if (focusId) {
        const row = document.querySelector(`#lessonsTable tbody tr[data-lesson-id="${focusId}"]`);
        if (row) {
            row.scrollIntoView({ behavior: 'smooth', block: 'center' });
            row.style.transition = 'background 0.3s';
            row.style.background = 'rgba(245,158,11,0.2)';
            setTimeout(() => { row.style.background = ''; }, 3000);
        }
    }
    if (editId) {
        editLesson(parseInt(editId));
    }
}

// ── Autosave Drafts (localStorage) ──────────────────────────────────
const AUTOSAVE_KEY = 'admin_lesson_draft';
let _autosaveTimer = null;
function startAutosave(formId) {
    stopAutosave();
    _autosaveTimer = setInterval(() => {
        const form = document.getElementById(formId);
        if (!form) return;
        const data = Object.fromEntries(new FormData(form).entries());
        try { localStorage.setItem(AUTOSAVE_KEY + '_' + formId, JSON.stringify(data)); } catch (e) {}
    }, 5000);
}
function stopAutosave() { if (_autosaveTimer) { clearInterval(_autosaveTimer); _autosaveTimer = null; } }
function restoreAutosave(formId) {
    try {
        const saved = JSON.parse(localStorage.getItem(AUTOSAVE_KEY + '_' + formId));
        if (!saved) return false;
        const form = document.getElementById(formId);
        if (!form) return false;
        Object.keys(saved).forEach(key => {
            const input = form.elements[key];
            if (input && input.type !== 'hidden' && key !== 'csrf_token') input.value = saved[key];
        });
        return true;
    } catch (e) { return false; }
}
function clearAutosave(formId) {
    try { localStorage.removeItem(AUTOSAVE_KEY + '_' + formId); } catch (e) {}
    stopAutosave();
}

// ── Init ────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
    loadLessons().then(() => { setTimeout(handleUrlParams, 300); });
    loadCategories();
});
</script>
