{# ── Content Management JS: Load, Remove, Move, Preview, Bulk Ops ──── #}
<script>
// ── Manage Content (open content modal) ─────────────────────────────
function manageContent(lessonId, lessonTitle) {
    currentLessonId = lessonId;
    document.getElementById('contentLessonTitle').textContent = `Content for: ${lessonTitle}`;
    loadLessonContent(lessonId);
    openModal('lessonContentModal');
}

// ── Load Lesson Content (page overview) ─────────────────────────────
async function loadLessonContent(lessonId) {
    try {
        const response = await fetch(`/api/admin/lessons/${lessonId}`);
        const lesson = await response.json();

        const pagesContainer = document.getElementById('pagesContainer');
        pagesContainer.innerHTML = '';

        if (lesson.pages.length === 0) {
            pagesContainer.innerHTML = `
                <div class="text-center py-8">
                    <i class="fas fa-file-circle-plus text-3xl text-gray-300 dark:text-slate-600 mb-2"></i>
                    <h6 class="text-gray-500 dark:text-slate-400 font-medium">No pages created yet</h6>
                    <p class="text-sm text-gray-400 dark:text-slate-500">Click "Add New Page" to create your first page</p>
                </div>
            `;
            return;
        }

        for (const page of lesson.pages) {
            const pageNum = page.page_number;
            const contentCount = page.content.length;
            const metadata = page.metadata;
            const title = metadata ? metadata.title : `Page ${pageNum}`;
            let description = metadata ? metadata.description : '';
            if (!description) {
                if (contentCount === 0) {
                    description = 'No content added yet';
                } else {
                    const contentTypes = [...new Set(page.content.map(item => item.content_type))];
                    description = `${contentCount} item${contentCount !== 1 ? 's' : ''} (${contentTypes.join(', ')})`;
                }
            }

            const pageType = metadata ? metadata.page_type : 'normal';
            const isCarousel = pageType === 'quiz_carousel';
            const pageHtml = `
                <div class="card mb-3 page-overview-card" data-page-number="${pageNum}">
                    <div class="card-body">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 flex-1">
                                <span class="drag-handle page-drag-handle" title="Seite ziehen"><i class="fas fa-grip-vertical"></i></span>
                                <div>
                                    <h6 class="font-semibold text-sm text-gray-900 dark:text-white mb-1">
                                        <span class="inline-editable" data-inline-edit="page-title" data-page-number="${pageNum}" contenteditable="true" spellcheck="false">${escapeHtml(title)}</span>
                                        ${isCarousel ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[0.65rem] font-medium bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300 ml-2"><i class="fas fa-layer-group mr-1"></i>Karussell</span>' : ''}
                                    </h6>
                                    <p class="text-xs text-gray-500 dark:text-slate-400 mb-0">${escapeHtml(truncateText(description, 100))}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button class="btn-sm" onclick="editPage(${pageNum})">
                                    <i class="fas fa-edit"></i> Edit Page
                                </button>
                                <button class="btn-sm btn-danger" onclick="deletePage(${pageNum})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            pagesContainer.insertAdjacentHTML('beforeend', pageHtml);
        }
        initPageSortable(lessonId);
        initPageInlineEdit(lessonId);
    } catch (error) {
        console.error('Error loading lesson content:', error);
        showToast('Error loading lesson content', 'error');
    }
}

// ── SortableJS for pages ────────────────────────────────────────────
let _pageSortable = null;
function initPageSortable(lessonId) {
    const container = document.getElementById('pagesContainer');
    if (!container || typeof Sortable === 'undefined') return;
    if (_pageSortable) { try { _pageSortable.destroy(); } catch (e) {} }
    _pageSortable = new Sortable(container, {
        handle: '.page-drag-handle',
        draggable: '.page-overview-card',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        dragClass: 'sortable-drag',
        onEnd: async () => {
            const numbers = Array.from(container.querySelectorAll('.page-overview-card'))
                .map(el => parseInt(el.dataset.pageNumber));
            try {
                const res = await fetch(`/api/admin/lessons/${lessonId}/pages/reorder`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ page_numbers: numbers })
                });
                if (!res.ok) throw new Error('page reorder failed');
                showToast('Seitenreihenfolge gespeichert');
                loadLessonContent(lessonId);
            } catch (err) {
                console.error(err);
                showToast('Fehler — bitte neu laden', 'error');
                loadLessonContent(lessonId);
            }
        }
    });
}

function initPageInlineEdit(lessonId) {
    document.querySelectorAll('[data-inline-edit="page-title"]').forEach(el => {
        if (el.dataset.inlineInit) return;
        el.dataset.inlineInit = '1';
        el.dataset.original = el.textContent.trim();
        el.addEventListener('mousedown', (e) => e.stopPropagation());
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
            if (e.key === 'Escape') { el.textContent = el.dataset.original; el.blur(); }
        });
        el.addEventListener('blur', async () => {
            const newTitle = el.textContent.trim();
            if (!newTitle || newTitle === el.dataset.original) { el.textContent = el.dataset.original; return; }
            const pageNum = el.dataset.pageNumber;
            el.classList.add('saving');
            try {
                const res = await fetch(`/api/admin/lessons/${lessonId}/pages/${pageNum}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
                    body: JSON.stringify({ title: newTitle })
                });
                if (!res.ok) throw new Error('page patch failed');
                el.dataset.original = newTitle;
                el.classList.remove('saving');
                el.classList.add('saved');
                setTimeout(() => el.classList.remove('saved'), 800);
            } catch (err) {
                el.textContent = el.dataset.original;
                el.classList.remove('saving');
                showToast('Fehler beim Speichern', 'error');
            }
        });
    });
}

// ── Remove Content ──────────────────────────────────────────────────
async function removeContent(lessonId, contentId) {
    if (!confirm('Are you sure you want to remove this content from the lesson?')) return;
    try {
        const response = await fetch(`/api/admin/lessons/${lessonId}/content/${contentId}/delete`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCSRFToken() }
        });
        if (response.ok) {
            const result = await response.json();
            loadLessonContent(lessonId);
            loadLessons();
            showToast(result.message || 'Content removed successfully');
        } else {
            const errorText = await response.text();
            let errorMessage = 'Failed to remove content';
            try { const error = JSON.parse(errorText); errorMessage = error.error || errorMessage; } catch (e) { errorMessage = errorText || errorMessage; }
            showToast('Error: ' + errorMessage, 'error');
        }
    } catch (error) {
        console.error('Network error removing content:', error);
        showToast('Network error: Unable to remove content', 'error');
    }
}

// ── Move Content ────────────────────────────────────────────────────
async function moveContent(contentId, direction) {
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/${contentId}/move`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ direction: direction })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error moving content:', error);
        showToast('Error moving content', 'error');
    }
}

// ── Content Preview (from content ID) ───────────────────────────────
async function previewContentById(contentId) {
    try {
        const response = await fetch(`/api/admin/content/${contentId}/preview`);
        const previewData = await response.json();
        const previewContainer = document.getElementById('contentPreviewContainer');
        previewContainer.innerHTML = generateContentPreviewHtml(previewData);
        openModal('contentPreviewModal');
    } catch (error) {
        console.error('Error loading content preview:', error);
        showToast('Error loading content preview', 'error');
    }
}

function generateContentPreviewHtml(content) {
    const headline = `<h5 class="font-semibold text-lg text-gray-900 dark:text-white break-words mb-3" style="word-break:break-word;white-space:normal;">${escapeHtml(content.title || 'Untitled Content')}</h5>`;
    let previewHtml = headline;
    switch (content.content_type) {
        case 'text':
            previewHtml += `<div class="rich-text-content break-words">${content.content_text || ''}</div>`;
            break;
        case 'image':
            if (content.media_url || content.file_path) previewHtml += `<img src="${content.media_url || content.file_path}" class="max-w-full rounded-lg" alt="${escapeHtml(content.title)}">`;
            if (content.content_text) previewHtml += `<p class="mt-2 break-words">${escapeHtml(content.content_text)}</p>`;
            break;
        case 'video':
            if (content.media_url || content.file_path) previewHtml += `<div class="aspect-video"><video controls class="w-full rounded-lg"><source src="${content.media_url || content.file_path}" type="video/mp4">Your browser does not support the video tag.</video></div>`;
            break;
        case 'audio':
            if (content.media_url || content.file_path) previewHtml += `<audio controls class="w-full"><source src="${content.media_url || content.file_path}" type="audio/mpeg">Your browser does not support the audio element.</audio>`;
            break;
        case 'interactive':
            previewHtml += renderInteractiveFromBackend(content);
            break;
        default:
            if (content.content_data) {
                previewHtml += `<div class="p-3 bg-gray-50 dark:bg-slate-800 rounded-lg text-sm">Content Type: ${escapeHtml(content.content_type)}</div>`;
                previewHtml += `<pre class="mt-2 text-xs bg-gray-50 dark:bg-slate-800 p-3 rounded-lg overflow-x-auto">${escapeHtml(JSON.stringify(content.content_data, null, 2))}</pre>`;
            }
    }
    return previewHtml;
}

// ── Render interactive content preview from backend data ──────────────
function renderInteractiveFromBackend(content) {
    const questions = content.quiz_questions || [];
    if (questions.length === 0) {
        return '<div class="p-3 bg-amber-50 dark:bg-amber-900/20 rounded-lg text-sm text-amber-700 dark:text-amber-300"><i class="fas fa-exclamation-triangle"></i> Diesem Item sind keine Fragen zugewiesen.</div>';
    }
    let html = '';
    questions.forEach((q, qi) => {
        const type = q.question_type;
        const typeLabel = { 'multiple_choice': 'Multiple Choice', 'true_false': 'True / False', 'fill_blank': 'Fill in the Blank', 'matching': 'Matching' }[type] || type;
        const typeBadge = {
            'multiple_choice': 'bg-indigo-100 text-indigo-700 dark:bg-indigo-900/30 dark:text-indigo-300',
            'true_false': 'bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-300',
            'fill_blank': 'bg-sky-100 text-sky-700 dark:bg-sky-900/30 dark:text-sky-300',
            'matching': 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-300'
        }[type] || 'bg-gray-100 text-gray-700 dark:bg-slate-800 dark:text-slate-300';
        html += `<div class="mb-4 pb-4 ${qi < questions.length - 1 ? 'border-b border-gray-200 dark:border-slate-700' : ''}">`;
        html += `<div class="mb-2 flex items-center gap-2">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-[0.65rem] font-semibold ${typeBadge} uppercase">${typeLabel}</span>
                    <span class="text-xs text-gray-400">Frage ${qi + 1}/${questions.length}</span>
                 </div>`;

        if (type === 'fill_blank') {
            const highlighted = escapeHtml(q.question_text || '').replace(/\[BLANK\]/g, '<span class="inline-block px-2 py-0.5 mx-0.5 rounded bg-indigo-100 text-indigo-700 dark:bg-indigo-900/40 dark:text-indigo-300 font-semibold text-xs">[BLANK]</span>');
            html += `<div class="mb-3 p-3 bg-gray-50 dark:bg-slate-800/60 rounded-lg border border-gray-200 dark:border-slate-700">
                        <div class="text-sm text-gray-900 dark:text-white break-words">${highlighted}</div>
                     </div>`;
            // Backend stores accepted answers in explanation for fill_blank
            const answers = String(q.explanation || '').split(',').map(s => s.trim()).filter(Boolean);
            if (answers.length > 0) {
                html += `<div class="text-xs text-gray-500 dark:text-slate-400 mb-1">Akzeptierte Antworten:</div><div class="flex flex-wrap gap-1">`;
                answers.forEach(a => {
                    html += `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-emerald-100 text-emerald-700 dark:bg-emerald-900/30 dark:text-emerald-300"><i class="fas fa-check mr-1"></i>${escapeHtml(a)}</span>`;
                });
                html += `</div>`;
            }
        } else {
            html += `<div class="mb-3 p-3 bg-gray-50 dark:bg-slate-800/60 rounded-lg border border-gray-200 dark:border-slate-700">
                        <div class="text-sm font-medium text-gray-900 dark:text-white break-words">${escapeHtml(q.question_text || '')}</div>
                     </div>`;
            const options = q.options || [];
            if (options.length > 0) {
                html += `<div class="space-y-2">`;
                options.sort((a,b) => (a.order_index || 0) - (b.order_index || 0)).forEach((opt, idx) => {
                    const letter = String.fromCharCode(65 + idx);
                    const correctCls = opt.is_correct
                        ? 'border-emerald-400 bg-emerald-50 dark:bg-emerald-900/20'
                        : 'border-gray-200 dark:border-slate-700';
                    const icon = opt.is_correct
                        ? '<i class="fas fa-check-circle text-emerald-500"></i>'
                        : '<i class="far fa-circle text-gray-300 dark:text-slate-600"></i>';
                    html += `
                        <div class="flex items-start gap-3 p-2.5 rounded-lg border ${correctCls}">
                            <div class="mt-0.5">${icon}</div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm text-gray-900 dark:text-white break-words"><span class="font-semibold mr-1">${letter}.</span>${escapeHtml(opt.option_text || '')}${opt.is_correct ? ' <span class="ml-1 inline-flex items-center px-1.5 py-0.5 rounded text-[0.6rem] font-medium bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300">Richtig</span>' : ''}</div>
                                ${opt.feedback ? `<div class="mt-1 text-xs text-gray-500 dark:text-slate-400 italic break-words"><i class="fas fa-comment-dots mr-1"></i>${escapeHtml(opt.feedback)}</div>` : ''}
                            </div>
                        </div>`;
                });
                html += `</div>`;
            }
        }

        // Explanation (not for fill_blank, since explanation there == correct answers)
        if (type !== 'fill_blank' && q.explanation) {
            html += `<div class="mt-3 p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg border border-blue-200 dark:border-blue-800">
                        <div class="text-xs font-semibold text-blue-700 dark:text-blue-300 mb-1"><i class="fas fa-lightbulb mr-1"></i>Erklaerung</div>
                        <div class="text-sm text-blue-900 dark:text-blue-100 break-words">${escapeHtml(q.explanation)}</div>
                     </div>`;
        }
        html += `</div>`;
    });
    // Footer with quiz settings
    const maxA = content.max_attempts || 3;
    const pass = content.passing_score || 70;
    html += `<div class="flex gap-4 text-xs text-gray-500 dark:text-slate-400 pt-2">
                <span><i class="fas fa-redo mr-1"></i>Max Attempts: <strong>${maxA}</strong></span>
                <span><i class="fas fa-percentage mr-1"></i>Passing Score: <strong>${pass}%</strong></span>
             </div>`;
    return html;
}

// ── Bulk Operations ─────────────────────────────────────────────────
function toggleBulkOperations() {
    const checkboxes = document.querySelectorAll('.content-checkbox:checked');
    const bulkPanel = document.getElementById('bulkOperationsPanel');
    const individualPanel = document.getElementById('individualActionsPanel');

    if (checkboxes.length === 1) {
        individualPanel.style.display = 'block';
        bulkPanel.style.display = 'none';
    } else if (checkboxes.length > 1) {
        bulkPanel.style.display = 'block';
        individualPanel.style.display = 'none';
    } else {
        bulkPanel.style.display = 'none';
        individualPanel.style.display = 'none';
    }
}

function hideBulkOperations() {
    document.getElementById('bulkOperationsPanel').style.display = 'none';
    document.querySelectorAll('.content-checkbox').forEach(cb => cb.checked = false);
}

function hideIndividualActions() {
    document.getElementById('individualActionsPanel').style.display = 'none';
    document.querySelectorAll('.content-checkbox').forEach(cb => cb.checked = false);
}

function getSelectedContentIds() {
    return Array.from(document.querySelectorAll('.content-checkbox:checked')).map(cb => parseInt(cb.value));
}

function individualPreview() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) previewContentById(ids[0]);
}

function individualEdit() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) editContent(ids[0]);
}

function individualDuplicate() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) bulkDuplicate();
}

async function bulkSetOptional(isOptional) {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-update`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds, updates: { is_optional: isOptional } })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            hideBulkOperations();
            showToast(`Content marked as ${isOptional ? 'optional' : 'required'}`);
        } else { throw new Error('Failed to update'); }
    } catch (error) {
        console.error('Error updating content:', error);
        showToast('Error updating content', 'error');
    }
}

async function bulkDuplicate() {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    if (!confirm(`Duplicate ${selectedIds.length} content item(s)?`)) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-duplicate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            loadLessons();
            hideBulkOperations();
            showToast('Content duplicated successfully');
        } else { throw new Error('Failed to duplicate'); }
    } catch (error) {
        console.error('Error duplicating content:', error);
        showToast('Error duplicating content', 'error');
    }
}

async function bulkDelete() {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    if (!confirm(`Delete ${selectedIds.length} content item(s)? This action cannot be undone.`)) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-delete`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            loadLessons();
            hideBulkOperations();
            showToast('Content deleted');
        } else { throw new Error('Failed to delete'); }
    } catch (error) {
        console.error('Error deleting content:', error);
        showToast('Error deleting content', 'error');
    }
}
</script>
