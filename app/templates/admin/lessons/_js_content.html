{# ── Content Management JS: Load, Remove, Move, Preview, Bulk Ops ──── #}
<script>
// ── Manage Content (open content modal) ─────────────────────────────
function manageContent(lessonId, lessonTitle) {
    currentLessonId = lessonId;
    document.getElementById('contentLessonTitle').textContent = `Content for: ${lessonTitle}`;
    loadLessonContent(lessonId);
    openModal('lessonContentModal');
}

// ── Load Lesson Content (page overview) ─────────────────────────────
async function loadLessonContent(lessonId) {
    try {
        const response = await fetch(`/api/admin/lessons/${lessonId}`);
        const lesson = await response.json();

        const pagesContainer = document.getElementById('pagesContainer');
        pagesContainer.innerHTML = '';

        if (lesson.pages.length === 0) {
            pagesContainer.innerHTML = `
                <div class="text-center py-8">
                    <i class="fas fa-file-circle-plus text-3xl text-gray-300 dark:text-slate-600 mb-2"></i>
                    <h6 class="text-gray-500 dark:text-slate-400 font-medium">No pages created yet</h6>
                    <p class="text-sm text-gray-400 dark:text-slate-500">Click "Add New Page" to create your first page</p>
                </div>
            `;
            return;
        }

        for (const page of lesson.pages) {
            const pageNum = page.page_number;
            const contentCount = page.content.length;
            const metadata = page.metadata;
            const title = metadata ? metadata.title : `Page ${pageNum}`;
            let description = metadata ? metadata.description : '';
            if (!description) {
                if (contentCount === 0) {
                    description = 'No content added yet';
                } else {
                    const contentTypes = [...new Set(page.content.map(item => item.content_type))];
                    description = `${contentCount} item${contentCount !== 1 ? 's' : ''} (${contentTypes.join(', ')})`;
                }
            }

            const pageHtml = `
                <div class="card mb-3 page-overview-card" data-page-number="${pageNum}">
                    <div class="card-body">
                        <div class="flex items-center justify-between">
                            <div>
                                <h6 class="font-semibold text-sm text-gray-900 dark:text-white mb-1">${escapeHtml(title)}</h6>
                                <p class="text-xs text-gray-500 dark:text-slate-400 mb-0">${escapeHtml(truncateText(description, 100))}</p>
                            </div>
                            <div class="flex gap-2">
                                <button class="btn-sm" onclick="editPage(${pageNum})">
                                    <i class="fas fa-edit"></i> Edit Page
                                </button>
                                <button class="btn-sm btn-danger" onclick="deletePage(${pageNum})">
                                    <i class="fas fa-trash"></i> Delete
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            pagesContainer.insertAdjacentHTML('beforeend', pageHtml);
        }
    } catch (error) {
        console.error('Error loading lesson content:', error);
        showToast('Error loading lesson content', 'error');
    }
}

// ── Remove Content ──────────────────────────────────────────────────
async function removeContent(lessonId, contentId) {
    if (!confirm('Are you sure you want to remove this content from the lesson?')) return;
    try {
        const response = await fetch(`/api/admin/lessons/${lessonId}/content/${contentId}/delete`, {
            method: 'DELETE',
            headers: { 'X-CSRFToken': getCSRFToken() }
        });
        if (response.ok) {
            const result = await response.json();
            loadLessonContent(lessonId);
            loadLessons();
            showToast(result.message || 'Content removed successfully');
        } else {
            const errorText = await response.text();
            let errorMessage = 'Failed to remove content';
            try { const error = JSON.parse(errorText); errorMessage = error.error || errorMessage; } catch (e) { errorMessage = errorText || errorMessage; }
            showToast('Error: ' + errorMessage, 'error');
        }
    } catch (error) {
        console.error('Network error removing content:', error);
        showToast('Network error: Unable to remove content', 'error');
    }
}

// ── Move Content ────────────────────────────────────────────────────
async function moveContent(contentId, direction) {
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/${contentId}/move`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ direction: direction })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
        } else {
            const error = await response.json();
            showToast('Error: ' + error.error, 'error');
        }
    } catch (error) {
        console.error('Error moving content:', error);
        showToast('Error moving content', 'error');
    }
}

// ── Content Preview (from content ID) ───────────────────────────────
async function previewContentById(contentId) {
    try {
        const response = await fetch(`/api/admin/content/${contentId}/preview`);
        const previewData = await response.json();
        const previewContainer = document.getElementById('contentPreviewContainer');
        previewContainer.innerHTML = generateContentPreviewHtml(previewData);
        openModal('contentPreviewModal');
    } catch (error) {
        console.error('Error loading content preview:', error);
        showToast('Error loading content preview', 'error');
    }
}

function generateContentPreviewHtml(content) {
    let previewHtml = `<h5>${escapeHtml(content.title || 'Untitled Content')}</h5>`;
    switch (content.content_type) {
        case 'text':
            previewHtml += `<div class="rich-text-content">${content.content_text || ''}</div>`;
            break;
        case 'image':
            if (content.media_url || content.file_path) previewHtml += `<img src="${content.media_url || content.file_path}" class="max-w-full rounded-lg" alt="${escapeHtml(content.title)}">`;
            if (content.content_text) previewHtml += `<p class="mt-2">${escapeHtml(content.content_text)}</p>`;
            break;
        case 'video':
            if (content.media_url || content.file_path) previewHtml += `<div class="aspect-video"><video controls class="w-full rounded-lg"><source src="${content.media_url || content.file_path}" type="video/mp4">Your browser does not support the video tag.</video></div>`;
            break;
        case 'audio':
            if (content.media_url || content.file_path) previewHtml += `<audio controls class="w-full"><source src="${content.media_url || content.file_path}" type="audio/mpeg">Your browser does not support the audio element.</audio>`;
            break;
        case 'interactive':
            previewHtml += '<div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg text-sm text-blue-700 dark:text-blue-300">Interactive content preview not available in admin panel.</div>';
            if (content.quiz_questions && content.quiz_questions.length > 0) {
                previewHtml += '<h6 class="mt-3 font-semibold">Questions:</h6><ul class="list-disc pl-5">';
                content.quiz_questions.forEach(q => { previewHtml += `<li>${escapeHtml(q.question_text)}</li>`; });
                previewHtml += '</ul>';
            }
            break;
        default:
            if (content.content_data) {
                previewHtml += `<div class="p-3 bg-gray-50 dark:bg-slate-800 rounded-lg text-sm">Content Type: ${escapeHtml(content.content_type)}</div>`;
                previewHtml += `<pre class="mt-2 text-xs bg-gray-50 dark:bg-slate-800 p-3 rounded-lg overflow-x-auto">${escapeHtml(JSON.stringify(content.content_data, null, 2))}</pre>`;
            }
    }
    return previewHtml;
}

// ── Bulk Operations ─────────────────────────────────────────────────
function toggleBulkOperations() {
    const checkboxes = document.querySelectorAll('.content-checkbox:checked');
    const bulkPanel = document.getElementById('bulkOperationsPanel');
    const individualPanel = document.getElementById('individualActionsPanel');

    if (checkboxes.length === 1) {
        individualPanel.style.display = 'block';
        bulkPanel.style.display = 'none';
    } else if (checkboxes.length > 1) {
        bulkPanel.style.display = 'block';
        individualPanel.style.display = 'none';
    } else {
        bulkPanel.style.display = 'none';
        individualPanel.style.display = 'none';
    }
}

function hideBulkOperations() {
    document.getElementById('bulkOperationsPanel').style.display = 'none';
    document.querySelectorAll('.content-checkbox').forEach(cb => cb.checked = false);
}

function hideIndividualActions() {
    document.getElementById('individualActionsPanel').style.display = 'none';
    document.querySelectorAll('.content-checkbox').forEach(cb => cb.checked = false);
}

function getSelectedContentIds() {
    return Array.from(document.querySelectorAll('.content-checkbox:checked')).map(cb => parseInt(cb.value));
}

function individualPreview() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) previewContentById(ids[0]);
}

function individualEdit() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) editContent(ids[0]);
}

function individualDuplicate() {
    const ids = getSelectedContentIds();
    if (ids.length === 1) bulkDuplicate();
}

async function bulkSetOptional(isOptional) {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-update`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds, updates: { is_optional: isOptional } })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            hideBulkOperations();
            showToast(`Content marked as ${isOptional ? 'optional' : 'required'}`);
        } else { throw new Error('Failed to update'); }
    } catch (error) {
        console.error('Error updating content:', error);
        showToast('Error updating content', 'error');
    }
}

async function bulkDuplicate() {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    if (!confirm(`Duplicate ${selectedIds.length} content item(s)?`)) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-duplicate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            loadLessons();
            hideBulkOperations();
            showToast('Content duplicated successfully');
        } else { throw new Error('Failed to duplicate'); }
    } catch (error) {
        console.error('Error duplicating content:', error);
        showToast('Error duplicating content', 'error');
    }
}

async function bulkDelete() {
    const selectedIds = getSelectedContentIds();
    if (selectedIds.length === 0) return;
    if (!confirm(`Delete ${selectedIds.length} content item(s)? This action cannot be undone.`)) return;
    try {
        const response = await fetch(`/api/admin/lessons/${currentLessonId}/content/bulk-delete`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRFToken() },
            body: JSON.stringify({ content_ids: selectedIds })
        });
        if (response.ok) {
            loadLessonContent(currentLessonId);
            loadLessons();
            hideBulkOperations();
            showToast('Content deleted');
        } else { throw new Error('Failed to delete'); }
    } catch (error) {
        console.error('Error deleting content:', error);
        showToast('Error deleting content', 'error');
    }
}
</script>
