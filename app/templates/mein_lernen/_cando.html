{# ░░ WAS DU JETZT KANNST ░░ #}
<div class="group-label">Was du jetzt kannst — Können vor Zählen</div>
<section class="card cando reveal" aria-labelledby="cando-h">
  <div class="cando-head">
    <div>
      <h2 id="cando-h">Im echten Japanisch</h2>
      <div class="sub" style="font-size:.86rem;color:var(--ink-500)">Alltags-Situationen, die du mit deinem aktuellen Stand meisterst — abgeleitet aus abgeschlossenen Lektionen & Grammatik.</div>
    </div>
    <div class="cando-prog"><span x-text="canDoDone"></span> / <span x-text="canDo.length"></span> · ≈ CEFR A1</div>
  </div>
  <div class="cando-grid">
    <template x-for="c in canDoVisible" :key="c.t">
      <div class="cando-item" :class="{'is-done':c.s==='done'}">
        <span class="mk" :class="c.s" aria-hidden="true" x-text="c.s==='done'?'✓':(c.s==='prog'?'◐':'·')"></span>
        <span class="txt">
          <span x-text="c.t"></span>
          <span class="stt" :style="`color:${c.s==='done'?'var(--matcha-deep)':c.s==='prog'?'var(--kincha-deep)':'var(--ink-400)'}`"
                x-text="c.s==='done'?'erreicht':(c.s==='prog'?'in Arbeit':'noch offen')"></span>
        </span>
      </div>
    </template>
  </div>
  <div class="cando-foot">
    <button class="cta-ghost sm" @click="canDoAll=!canDoAll" x-text="canDoAll?'Weniger anzeigen':('Alle '+canDo.length+' anzeigen')"></button>
    <span><i class="fas fa-circle-info" aria-hidden="true"></i> N5 entspricht seit Dez 2025 offiziell CEFR A1.</span>
  </div>
</section>
