# Local-only overrides (auto-loaded by docker compose)
# Heimserver-Setup: nutzt Dockerfile.cloudrun statt nicht-existierender Dockerfile,
# lädt .env mit echten Werten, lauscht auf Port 5000 (passt zum compose port mapping).

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.cloudrun
    env_file:
      - .env
    environment:
      PORT: "5000"
      # Override docker-compose.yml: requirements.txt hat psycopg2-binary, nicht psycopg v3
      DATABASE_URL: "postgresql+psycopg2://app_user:JapaneseApp2025!@db:5432/japanese_learning"
    # Heimserver: Container nach Boot/Crash automatisch neu starten (Autostart)
    restart: unless-stopped
    # Heimserver: Medien-Uploads aus Host-Verzeichnis serven — persistent ueber Container-
    # Neustarts, kein Image-Rebuild bei neuen Bildern/Audio noetig. Host-UID 1000 == Container 'app'.
    volumes:
      - ./app/static/uploads:/app/app/static/uploads

  db:
    # Heimserver: DB ebenfalls automatisch neu starten
    restart: unless-stopped
