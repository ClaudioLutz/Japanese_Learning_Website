<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px;background:var(--washi)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{border-radius:10px;border:1px solid var(--ink-200);overflow:hidden;background:#fff}
.tile img{display:block;width:100%;height:90px;object-fit:cover}
.lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);padding:6px 8px;text-align:center}
</style></head><body>
<div class="grid">
  <div class="tile"><img src="../assets/hero-photo.jpg" alt=""><div class="lbl">hero-photo.jpg · warm golden hour, sakura, no grain</div></div>
  <div class="tile"><img src="../assets/og-image.png" alt=""><div class="lbl">og-image.png · 1200×630 social card</div></div>
</div></body></html>
