<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--washi)}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--shu-soft);border:1px solid var(--shu);border-radius:4px}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
  h4{margin:0 0 10px;font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--fg-1);text-transform:uppercase;letter-spacing:.08em}
</style></head><body>
<h4>Spacing — 8px base</h4>
<div class="grid">
  <div class="item"><div class="box" style="width:4px;height:4px"></div><div class="lbl">1 · 4</div></div>
  <div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">2 · 8</div></div>
  <div class="item"><div class="box" style="width:12px;height:12px"></div><div class="lbl">3 · 12</div></div>
  <div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">4 · 16</div></div>
  <div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">6 · 24</div></div>
  <div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">8 · 32</div></div>
  <div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">12 · 48</div></div>
  <div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lbl">16 · 64</div></div>
</div>
</body></html>
