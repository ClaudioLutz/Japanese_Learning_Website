<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--washi);font-family:var(--font-body)}
  .frame{background:#fff;border:1px solid var(--ink-200);border-radius:12px;box-shadow:var(--shadow-lifted);overflow:hidden}
  .chrome{display:flex;align-items:center;gap:.4rem;padding:.55rem .8rem;background:var(--ink-100);border-bottom:1px solid var(--ink-200)}
  .chrome > span{width:10px;height:10px;border-radius:50%;background:var(--ink-300)}
  .url{margin-left:.6rem;flex:1;font-family:var(--font-mono);font-size:.72rem;color:var(--fg-3);text-align:center;padding:.18rem .5rem;background:rgba(255,255,255,.6);border-radius:6px}
  .stage{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;padding:1.2rem 1rem;background:var(--washi)}
  .kc{background:#fff;border:1px solid var(--ink-200);border-radius:10px;padding:.7rem .4rem;text-align:center}
  .ja{font-family:var(--font-jp);font-weight:500;font-size:1.7rem;color:var(--sumi);line-height:1.1}
  .ro{margin-top:.25rem;font-family:var(--font-mono);font-size:.68rem;color:var(--fg-3);letter-spacing:.05em}
</style></head><body>
<div class="frame">
  <div class="chrome"><span></span><span></span><span></span><div class="url">japanese-learning.ch / lessons / hiragana-1</div></div>
  <div class="stage">
    <div class="kc"><div class="ja">あ</div><div class="ro">a</div></div>
    <div class="kc"><div class="ja">い</div><div class="ro">i</div></div>
    <div class="kc"><div class="ja">う</div><div class="ro">u</div></div>
    <div class="kc"><div class="ja">え</div><div class="ro">e</div></div>
    <div class="kc"><div class="ja">お</div><div class="ro">o</div></div>
  </div>
</div>
</body></html>
