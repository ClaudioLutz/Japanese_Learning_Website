<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--washi)}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:120px;height:80px;background:#fff;border-radius:10px}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-align:center}
  h4{margin:0 0 16px;font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--fg-1);text-transform:uppercase;letter-spacing:.08em}
</style></head><body>
<h4>Shadows — warm sumi tint, never bluish</h4>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-subtle)"></div><div class="lbl">subtle · default cards</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="lbl">card · hover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lifted)"></div><div class="lbl">lifted · modals, dropdowns</div></div>
  <div class="item"><div class="box" style="background:linear-gradient(180deg,#EB6101,#D85700);box-shadow:var(--shadow-cta)"></div><div class="lbl">cta · primary button</div></div>
</div>
</body></html>
