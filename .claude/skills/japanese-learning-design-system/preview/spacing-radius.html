<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--washi)}
  .row{display:flex;gap:16px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:80px;height:60px;background:#fff;border:1px solid var(--ink-200)}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3)}
  h4{margin:0 0 14px;font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--fg-1);text-transform:uppercase;letter-spacing:.08em}
</style></head><body>
<h4>Corner radii</h4>
<div class="row">
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl">sm · 6 · chips, inputs</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md · 8 · buttons</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg · 12 · cards, panels</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">xl · 16</div></div>
  <div class="item"><div class="box" style="border-radius:9999px;width:120px"></div><div class="lbl">full · 9999 · pills</div></div>
</div>
</body></html>
