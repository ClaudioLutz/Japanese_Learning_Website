<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--washi);font-family:var(--font-body);color:var(--fg-2)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .sw{border-radius:8px;border:1px solid var(--ink-200);overflow:hidden;background:#fff}
  .chip{height:64px}
  .meta{padding:8px 10px;font-size:11px;line-height:1.35}
  .name{font-family:var(--font-display);font-weight:600;color:var(--fg-1);font-size:12px;letter-spacing:-0.01em}
  .hex{font-family:var(--font-mono);color:var(--fg-3);font-size:10.5px;margin-top:2px}
  .role{color:var(--fg-3);font-size:10.5px;margin-top:1px}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#1F2A44"></div><div class="meta"><div class="name">kon · 紺</div><div class="hex">#1F2A44</div><div class="role">headings, brand</div></div></div>
  <div class="sw"><div class="chip" style="background:#264F7E"></div><div class="meta"><div class="name">ai · 藍</div><div class="hex">#264F7E</div><div class="role">links</div></div></div>
  <div class="sw"><div class="chip" style="background:#EB6101"></div><div class="meta"><div class="name">shu · 朱</div><div class="hex">#EB6101</div><div class="role">primary CTA, active</div></div></div>
  <div class="sw"><div class="chip" style="background:#B84A00"></div><div class="meta"><div class="name">shu-deep</div><div class="hex">#B84A00</div><div class="role">CTA gradient bottom</div></div></div>
  <div class="sw"><div class="chip" style="background:#7A9033"></div><div class="meta"><div class="name">matcha · 抹茶</div><div class="hex">#7A9033</div><div class="role">success, completion</div></div></div>
  <div class="sw"><div class="chip" style="background:#C7802D"></div><div class="meta"><div class="name">kincha · 金茶</div><div class="hex">#C7802D</div><div class="role">premium accent</div></div></div>
  <div class="sw"><div class="chip" style="background:#D14B3D"></div><div class="meta"><div class="name">vermillion (legacy)</div><div class="hex">#D14B3D</div><div class="role">danger</div></div></div>
  <div class="sw"><div class="chip" style="background:#F4D9C7"></div><div class="meta"><div class="name">shu-soft</div><div class="hex">#F4D9C7</div><div class="role">tinted backgrounds</div></div></div>
</div>
</body></html>
