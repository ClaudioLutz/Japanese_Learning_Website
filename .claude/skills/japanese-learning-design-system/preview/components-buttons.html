<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--washi)}
  .row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  h4{margin:0 0 14px;font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--fg-1);text-transform:uppercase;letter-spacing:.08em}
  .btn-shu{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.5rem;border:none;border-radius:8px;font-weight:600;font-size:1rem;color:#fff;cursor:pointer;text-decoration:none;background:linear-gradient(180deg,#EB6101,#D85700);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 1px 2px rgba(184,74,0,.30),0 0 0 1px rgba(184,74,0,.40);font-family:var(--font-body)}
  .btn-ghost{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.5rem;border:1px solid var(--ink-300);border-radius:8px;background:transparent;color:var(--sumi);font-weight:500;font-size:1rem;text-decoration:none;font-family:var(--font-body)}
  .btn-kon{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem .9rem;border-radius:8px;background:var(--kon);color:#fff;font-weight:600;font-size:.88rem;text-decoration:none;font-family:var(--font-body)}
  .btn-disabled{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 1.5rem;border:none;border-radius:8px;background:var(--ink-300);color:#fff;font-weight:600;font-size:1rem;cursor:not-allowed;font-family:var(--font-body)}
</style></head><body>
<h4>Buttons</h4>
<div class="row">
  <a class="btn-shu">Kostenlos starten</a>
  <a class="btn-ghost">N5 Komplett · CHF 9.90</a>
  <a class="btn-kon">Beginnen →</a>
  <button class="btn-disabled">Gesperrt</button>
</div>
</body></html>
