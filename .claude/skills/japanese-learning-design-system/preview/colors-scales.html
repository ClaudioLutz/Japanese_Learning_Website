<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--washi);font-family:var(--font-body)}
  .row{display:grid;grid-template-columns:repeat(11,1fr);gap:6px}
  .sw{border-radius:6px;border:1px solid var(--ink-200);overflow:hidden}
  .chip{height:60px}
  .meta{padding:5px 6px;font-size:10px;font-family:var(--font-mono);text-align:center;background:#fff;color:var(--fg-2)}
  .label{font-family:var(--font-display);font-weight:600;font-size:11px;color:var(--fg-1);margin:6px 0 4px;letter-spacing:-.01em}
</style></head><body>
<div class="label">Ink scale — warm neutral, washi-tinted (never cool gray)</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:#FAF7F2"></div><div class="meta">50</div></div>
  <div class="sw"><div class="chip" style="background:#F1EDE6"></div><div class="meta">100</div></div>
  <div class="sw"><div class="chip" style="background:#E4DED4"></div><div class="meta">200</div></div>
  <div class="sw"><div class="chip" style="background:#D4CCBE"></div><div class="meta">300</div></div>
  <div class="sw"><div class="chip" style="background:#A8A095"></div><div class="meta">400</div></div>
  <div class="sw"><div class="chip" style="background:#7A7368"></div><div class="meta" style="color:#fff;background:#7A7368">500</div></div>
  <div class="sw"><div class="chip" style="background:#5C564D"></div><div class="meta" style="color:#fff;background:#5C564D">600</div></div>
  <div class="sw"><div class="chip" style="background:#403B34"></div><div class="meta" style="color:#fff;background:#403B34">700</div></div>
  <div class="sw"><div class="chip" style="background:#2C2924"></div><div class="meta" style="color:#fff;background:#2C2924">800</div></div>
  <div class="sw"><div class="chip" style="background:#1C1A17"></div><div class="meta" style="color:#fff;background:#1C1A17">900</div></div>
  <div class="sw"><div class="chip" style="background:#0F0E0C"></div><div class="meta" style="color:#fff;background:#0F0E0C">950</div></div>
</div>
<div class="label">Kon scale — navy tints for headings & quiet panels</div>
<div class="row" style="grid-template-columns:repeat(5,1fr)">
  <div class="sw"><div class="chip" style="background:#F2F4F8"></div><div class="meta">kon-50</div></div>
  <div class="sw"><div class="chip" style="background:#E1E5EE"></div><div class="meta">kon-100</div></div>
  <div class="sw"><div class="chip" style="background:#9AA6BD"></div><div class="meta">kon-300</div></div>
  <div class="sw"><div class="chip" style="background:#3F4E72"></div><div class="meta" style="color:#fff;background:#3F4E72">kon-500</div></div>
  <div class="sw"><div class="chip" style="background:#1F2A44"></div><div class="meta" style="color:#fff;background:#1F2A44">kon</div></div>
</div>
</body></html>
