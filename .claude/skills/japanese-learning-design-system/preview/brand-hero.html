<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:0;background:var(--washi);font-family:var(--font-body)}
  .hero{background:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(31,42,68,.18), transparent 60%),radial-gradient(ellipse 60% 40% at 85% 10%, rgba(235,97,1,.08), transparent 55%),linear-gradient(180deg, #FAF7F2 0%, #F5F0E8 100%);padding:32px 24px 28px;text-align:center}
  .h1{font-family:var(--font-display);font-weight:510;font-size:38px;letter-spacing:-.03em;line-height:1.05;color:var(--kon);margin:14px 0 10px}
  .sub{font-size:.95rem;color:var(--ink-600);margin:0 auto 14px;max-width:480px;line-height:1.5}
  .btns{display:flex;gap:.6rem;justify-content:center}
  .btn-shu{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.1rem;border:none;border-radius:8px;font-weight:600;font-size:.9rem;color:#fff;background:linear-gradient(180deg,#EB6101,#D85700);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 1px 2px rgba(184,74,0,.3),0 0 0 1px rgba(184,74,0,.4);text-decoration:none;font-family:var(--font-body)}
  .btn-ghost{display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.1rem;border:1px solid var(--ink-300);border-radius:8px;background:transparent;color:var(--sumi);font-weight:500;font-size:.9rem;text-decoration:none;font-family:var(--font-body)}
</style></head><body>
<div class="hero">
  <span class="eyebrow">JLPT N5 · auf Deutsch · in der Schweiz gemacht</span>
  <h1 class="h1">Hiragana am Morgen.<br>Kanji am Abend.</h1>
  <p class="sub">Strukturiert nach JLPT-N5. 261 Vokabeln, 44 Kanji, wöchentlich neu — auf Deutsch erklärt.</p>
  <div class="btns"><a class="btn-shu">Kostenlos starten</a><a class="btn-ghost">N5 Komplett · CHF 9.90</a></div>
</div>
</body></html>
