<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--washi)}
  .row{display:flex;gap:16px;align-items:flex-end}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .ja{font-family:var(--font-jp);font-weight:500;color:var(--sumi);line-height:1}
  .roma{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:.05em}
  .lbl{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
</style></head><body>
<div class="lbl">Japanese type — Noto Sans JP 500 · Noto Serif JP 400</div>
<div class="row">
  <div class="cell"><div class="ja" style="font-size:64px">あ</div><div class="roma">a · sans</div></div>
  <div class="cell"><div class="ja" style="font-size:48px">日本語</div><div class="roma">nihongo</div></div>
  <div class="cell"><div class="ja" style="font-family:var(--font-jp-serif);font-size:48px;font-weight:500">桜</div><div class="roma">sakura · serif</div></div>
  <div class="cell"><div class="ja" style="font-size:36px">私は学生です。</div><div class="roma">watashi wa gakusei desu.</div></div>
</div>
</body></html>
