<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--washi)}
  h4{margin:0 0 12px;font-family:var(--font-display);font-weight:600;font-size:12px;color:var(--fg-1);text-transform:uppercase;letter-spacing:.08em}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .stat{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .6rem;background:rgba(0,0,0,.04);border-radius:9999px;font-size:.8rem;font-weight:600;color:#4a4a4a;font-family:var(--font-body)}
  .badge{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .6rem;border-radius:9999px;font-family:var(--font-display);font-size:.7rem;font-weight:700;letter-spacing:.05em;color:#fff}
  .next{background:var(--shu)}
  .free{background:rgba(122,144,51,.12);color:var(--matcha);font-weight:600}
  .premium{background:rgba(245,166,35,.15);color:#a06a00}
  .level{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .65rem;border-radius:9999px;background:#fff;border:1px solid var(--ink-200);font-size:.82rem;font-weight:600;color:var(--fg-1);font-family:var(--font-body)}
</style></head><body>
<h4>Eyebrow + chips</h4>
<div class="row" style="margin-bottom:14px">
  <span class="eyebrow">JLPT N5 · auf Deutsch</span>
  <span class="eyebrow" style="border-color:var(--shu);color:var(--shu);background:rgba(235,97,1,.06)">NEU</span>
</div>
<h4>Stat pills · gamification</h4>
<div class="row" style="margin-bottom:14px">
  <span class="stat">🔥 14</span>
  <span class="stat">⚡ Lv.4</span>
  <span class="stat">🧠 12 Karten</span>
  <span class="level"><span style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#2563eb);color:#fff;font-size:.7rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center">C</span>claudio</span>
</div>
<h4>Status badges</h4>
<div class="row">
  <span class="badge next">START</span>
  <span class="badge free">GRATIS</span>
  <span class="badge premium">N5 BUNDLE</span>
  <span class="badge" style="background:rgba(122,144,51,.1);color:var(--matcha)">✓ ABGESCHLOSSEN</span>
</div>
</body></html>
